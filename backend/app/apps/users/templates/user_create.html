{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen bg-gradient-to-b from-gray-900 via-gray-800 to-gray-900 py-12 px-4">
  <div class="max-w-lg mx-auto">

    <a href="{% url 'crud_users' %}" class="inline-flex items-center text-gray-400 hover:text-white mb-8 group">
      <svg class="w-5 h-5 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Назад
    </a>

    <div class="bg-gray-800/50 rounded-2xl border border-gray-700/50 p-6">
      <h2 class="text-xl font-bold text-white mb-6">Створити користувача</h2>

      <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-sm text-gray-400 mb-1">Username</label>
          <input type="text" name="username" required
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Password</label>
          <input type="password" name="password" required
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Ім'я</label>
          <input type="text" name="first_name" required
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Прізвище</label>
          <input type="text" name="last_name" required
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">По батькові</label>
          <input type="text" name="patronymic" required
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Документ паспорта</label>
          <input type="text" name="document_in_passport" required
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">НН паспорта</label>
          <input type="text" name="nn_in_passport" required
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Фото</label>
          <input type="file" name="photo" accept="image/*"
            class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Магазин</label>
          <select name="shop" class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <option value="">— Без магазину —</option>
            {% for shop in shops %}
              <option value="{{ shop.pk }}">{{ shop.title }}</option>
            {% endfor %}
          </select>
        </div>

        <button type="submit" class="w-full py-2 bg-gradient-to-r from-blue-500 to-blue-700 hover:bg-gradient-to-br text-white font-medium rounded-full transition-all">
          Створити
        </button>

      </form>
    </div>
  </div>
</div>
{% endblock %}
