{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto mt-16 bg-white p-8 rounded-2xl shadow">

    <h2 class="text-2xl font-bold text-red-600 mb-6">
        Видалення користувача
    </h2>

    <p class="mb-6 text-gray-700">
        Ви дійсно хочете видалити цього користувача?
    </p>

    <div class="bg-gray-100 p-4 rounded-lg mb-6">
        <p><b>Ім'я:</b> {{ user_obj.first_name }}</p>
        <p><b>Прізвище:</b> {{ user_obj.last_name }}</p>
        <p><b>Username:</b> {{ user_obj.username }}</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="mt-6 flex gap-3">

        <button type="submit"
                class="bg-red-600 text-white px-3 py-2 rounded-lg hover:bg-red-700">
            Видалити
        </button>

        <a href="{% url 'crud_users' %}"
           class="bg-gray-300 px-3 py-2 rounded-lg hover:bg-gray-400">
            Скасувати
        </a>

    </form>

</div>

{% endblock %}
