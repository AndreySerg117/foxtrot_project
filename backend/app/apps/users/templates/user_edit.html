{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow">

    <h2 class="text-2xl font-bold mb-6">Редагування користувача</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Ім'я -->
        <div class="mb-4">
            <label class="block mb-1">Ім'я</label>
            <input type="text" name="first_name"
                   value="{{ user_obj.first_name }}"
                   class="w-full border rounded-lg px-4 py-2">
        </div>

        <!-- Прізвище -->
        <div class="mb-4">
            <label class="block mb-1">Прізвище</label>
            <input type="text" name="last_name"
                   value="{{ user_obj.last_name }}"
                   class="w-full border rounded-lg px-4 py-2">
        </div>

        <!-- По батькові -->
        <div class="mb-4">
            <label class="block mb-1">По батькові</label>
            <input type="text" name="patronymic"
                   value="{{ user_obj.patronymic }}"
                   class="w-full border rounded-lg px-4 py-2">
        </div>

        <!-- Документ -->
        <div class="mb-4">
            <label class="block mb-1">Документ</label>
            <input type="text" name="document_in_passport"
                   value="{{ user_obj.document_in_passport }}"
                   class="w-full border rounded-lg px-4 py-2">
        </div>

        <!-- ІНН -->
        <div class="mb-6">
            <label class="block mb-1">ІНН</label>
            <input type="text" name="nn_in_passport"
                   value="{{ user_obj.nn_in_passport }}"
                   class="w-full border rounded-lg px-4 py-2">
        </div>

        <button type="submit"
                class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
            Зберегти
        </button>

        <a href="{% url 'crud_users' %}"
           class="ml-3 text-gray-600">
            Назад
        </a>

    </form>

</div>

{% endblock %}
