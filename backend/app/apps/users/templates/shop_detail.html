{% extends 'base.html' %}

{% block content %}

<div class="min-h-screen bg-gradient-to-b from-gray-900 via-gray-800 to-gray-900 py-12 px-4 sm:px-6 lg:px-8">
   <div class="max-w-4xl mx-auto">
      <a href="{% url 'index' %}" class="inline-flex items-center text-gray-400 hover:text-gray transition-colors mb-8 group">
         <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
         </svg>
         Назад до списку
      </a>
      <div class="bg-gray-800/50 backdrop-blur-sm rounded-2xl shadow-2xl overflow-hidden border border-gray-700/50">
         <div class="md:flex">

            <div class="md:w-1/3 p-6 flex justify-center items-start">
               <div class="relative group">
                  {% if shop.poster %}
                     <img
                        src="{{ shop.poster.url }}"
                        alt="Обкладинка магазину {{ shop }}"
                        class="w-64 h-64 aspect-square object-cover rounded-xl shadow-lg transform group-hover:scale-105 transition-transform duration-300"
                     >
                  {% else %}
                     <div class="w-64 h-64 bg-gray-700 rounded-xl flex items-center justify-center">
                        <svg class="w-20 h-20 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
                        </svg>
                     </div>
                  {% endif %}
                  <div class="absolute inset-0 bg-blue-500/20 rounded-xl blur-xl -z-10 group-hover:bg-blue-500/30 transition-colors"></div>
               </div>
            </div>

            <div class="md:w-2/3 flex flex-col justify-between p-6">
               <div>
                  <div class="flex items-center mb-6">
                     <span class="px-3 py-1 bg-blue-600/20 text-blue-400 rounded-full text-sm font-medium border border-blue-500/30">
                        <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                        </svg>
                        Магазин: {{ shop }}
                     </span>
                  </div>

                  {% if shop.description %}
                     <div class="mb-6">
                        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Опис</h3>
                        <p class="text-gray-300 leading-relaxed">{{ shop.description }}</p>
                     </div>
                  {% endif %}
               </div>

               <div class="bg-gray-900/30 px-6 py-4 border-t border-gray-700/50 mt-auto">
                  <div class="flex flex-wrap gap-3 justify-between items-center">
                     <div class="flex items-center text-gray-500 text-sm">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
                        </svg>
                        ID: {{ shop.pk }}
                     </div>
                     <div class="flex gap-3">
                        <a href="{% url 'crud_users' %}" class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 dark:focus:ring-blue-800 rounded-lg transition-all">
                           <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                           </svg>
                           До промоутерів
                        </a>
                     </div>
                  </div>
               </div>

            </div>

         </div>
      </div>
   </div>
</div>

{% endblock %}
